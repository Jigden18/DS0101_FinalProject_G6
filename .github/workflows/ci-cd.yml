name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Test backend ───────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: internconnect_backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: internconnect_backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── Job 2: Test frontend ──────────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: InternConnect
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: InternConnect/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test -- --watchAll=false

      - name: Build check
        run: npm run build

  # ── Job 3: Build and push images ─────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PERSONAL_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./internconnect_backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/internconnect-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/internconnect-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./InternConnect
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/internconnect-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/internconnect-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://internconnect-backend-uyuc.onrender.com

  # ── Job 4: Security scan ──────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/internconnect-backend:latest
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/internconnect-frontend:latest
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL

  # ── Job 5: Deploy to Render ───────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Deploy backend to Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"

      - name: Deploy frontend to Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"